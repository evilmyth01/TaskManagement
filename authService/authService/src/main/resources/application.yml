spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/task
    username:
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


server:
  port: 8081
  servlet:
    context-path: /api/v1


jwt:
  secret:
